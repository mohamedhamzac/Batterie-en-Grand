<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://worldtimeapi.org; object-src 'none'; media-src 'none'; worker-src 'none'; child-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content">
  <meta name="referrer" content="no-referrer">
  <title>Batterie en Grand</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="brand-mark" aria-label="Batterie en Grand">
    <img src="logo.svg" alt="Logo Batterie en Grand">
    <span>Batterie en Grand</span>
  </div>

  <div class="container">
    <div class="battery-panel">
      <section class="clock-panel">
        <p id="clockLabel" class="clock-label">Heure actuelle</p>
        <div id="clockTime" class="clock-time">--:--:--</div>
      </section>

      <!-- Batterie gauche (charge) -->
      <div class="battery-left">
        <div id="leftFill" class="fill-left"></div>
        <div id="bolt" class="bolt">⚡</div>
      </div>

      <!-- Pourcentage -->
      <div id="percent" class="percent">--%</div>

      <!-- Batterie droite (niveau) -->
      <div class="battery-right">
        <div id="rightFill" class="fill-right"></div>
        <div id="rightBubbles" class="battery-bubbles" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <div class="controls-panel">
    <label class="timezone-picker">
      <select id="timezoneSelect" class="timezone-select"></select>
    </label>
  </div>

  <div class="theme-controls">
    <div id="themeSwitch" class="theme-switch" role="group" aria-label="Choix du theme">
      <span class="theme-switch-thumb" aria-hidden="true"></span>
      <button
        id="themeLightButton"
        class="theme-option theme-option-light"
        type="button"
        aria-pressed="false"
        aria-label="Activer le mode clair"
      >
        <span class="theme-icon" aria-hidden="true">☀</span>
      </button>
      <button
        id="themeDarkButton"
        class="theme-option theme-option-dark"
        type="button"
        aria-pressed="false"
        aria-label="Activer le mode sombre"
      >
        <span class="theme-icon" aria-hidden="true">☾</span>
      </button>
    </div>

    <button
      id="paletteButton"
      class="palette-button"
      type="button"
      aria-expanded="false"
      aria-controls="palettePanel"
      aria-label="Ouvrir la palette de couleurs"
    >
      <span class="palette-icon" aria-hidden="true">🎨</span>
    </button>
  </div>

  <div id="palettePanel" class="palette-panel" aria-hidden="true">
    <label class="palette-field">
      <span>Fond</span>
      <input id="backgroundColorInput" type="color" value="#dbeafe" aria-label="Choisir la couleur du fond">
    </label>
    <label class="palette-field">
      <span>Accent</span>
      <input id="accentColorInput" type="color" value="#38bdf8" aria-label="Choisir la couleur d'accent">
    </label>
    <label class="palette-field">
      <span>Logo</span>
      <input id="logoColorInput" type="color" value="#22c55e" aria-label="Choisir la couleur du logo">
    </label>
  </div>

  <div class="hint-group">
    <div id="fullscreenHint" class="hint">Cliquer pour plein écran</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
