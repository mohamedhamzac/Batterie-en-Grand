<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://worldtimeapi.org; object-src 'none'; media-src 'none'; worker-src 'none'; child-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; block-all-mixed-content">
  <meta name="referrer" content="no-referrer">
  <title>Batterie en Grand</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="brand-mark" aria-label="Batterie en Grand">
    <img id="brandLogoImage" src="logo.svg" alt="Logo Batterie en Grand">
    <span id="brandLogoGlyph" class="brand-logo-glyph" aria-hidden="true"></span>
    <span id="brandLogoText">Batterie en Grand</span>
  </div>

  <div class="container">
    <div class="battery-panel">
      <section class="clock-panel">
        <p id="clockDate" class="clock-date">--</p>
        <p id="clockLabel" class="clock-label">Heure actuelle</p>
        <div id="clockTime" class="clock-time">--:--:--</div>
      </section>

      <!-- Batterie gauche (charge) -->
      <div class="battery-left">
        <div id="leftFill" class="fill-left"></div>
        <div id="bolt" class="bolt">⚡</div>
      </div>

      <!-- Pourcentage -->
      <div id="percent" class="percent">--%</div>

      <!-- Batterie droite (niveau) -->
      <div class="battery-right">
        <div id="rightFill" class="fill-right"></div>
        <div id="rightBubbles" class="battery-bubbles" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <div class="controls-panel">
    <label class="timezone-search-field">
      <span class="sr-only">Rechercher un fuseau horaire</span>
      <input
        id="timezoneSearchInput"
        class="timezone-search-input"
        type="search"
        placeholder="Rechercher un pays ou un UTC"
        aria-label="Rechercher un fuseau horaire"
        autocomplete="off"
        spellcheck="false"
      >
    </label>
    <label class="timezone-picker">
      <select id="timezoneSelect" class="timezone-select"></select>
    </label>
  </div>

  <div class="theme-controls">
    <div id="themeSwitch" class="theme-switch" role="group" aria-label="Choix du theme">
      <span class="theme-switch-thumb" aria-hidden="true"></span>
      <button
        id="themeLightButton"
        class="theme-option theme-option-light"
        type="button"
        aria-pressed="false"
        aria-label="Activer le mode clair"
      >
        <span class="theme-icon" aria-hidden="true">☀</span>
      </button>
      <button
        id="themeDarkButton"
        class="theme-option theme-option-dark"
        type="button"
        aria-pressed="false"
        aria-label="Activer le mode sombre"
      >
        <span class="theme-icon" aria-hidden="true">☾</span>
      </button>
    </div>

    <button
      id="paletteButton"
      class="palette-button"
      type="button"
      aria-expanded="false"
      aria-controls="palettePanel"
      aria-label="Ouvrir la palette de couleurs"
    >
      <span class="palette-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M12 3C6.48 3 2 6.92 2 11.75C2 14.61 4.24 17 7 17H8.09C8.59 17 9 17.41 9 17.91C9 18.13 8.93 18.35 8.8 18.53C8.28 19.23 8 20.03 8 20.88C8 22.6 9.4 24 11.12 24C17.13 24 22 19.13 22 13.12C22 7.53 17.52 3 12 3ZM6.5 12C5.67 12 5 11.33 5 10.5S5.67 9 6.5 9S8 9.67 8 10.5S7.33 12 6.5 12ZM10 8C9.17 8 8.5 7.33 8.5 6.5S9.17 5 10 5S11.5 5.67 11.5 6.5S10.83 8 10 8ZM14 8C13.17 8 12.5 7.33 12.5 6.5S13.17 5 14 5S15.5 5.67 15.5 6.5S14.83 8 14 8ZM17.5 12C16.67 12 16 11.33 16 10.5S16.67 9 17.5 9S19 9.67 19 10.5S18.33 12 17.5 12Z"/>
        </svg>
      </span>
    </button>
  </div>

  <div id="palettePanel" class="palette-panel" aria-hidden="true">
    <div class="palette-actions">
      <button id="undoButton" class="palette-action-button" type="button" aria-label="Annuler une modification">←</button>
      <button id="redoButton" class="palette-action-button" type="button" aria-label="Rétablir une modification">→</button>
      <button id="resetPaletteButton" class="palette-action-button palette-reset-button" type="button">Réinitialiser</button>
    </div>

    <div class="palette-section">
      <p class="palette-section-title">Fond</p>
      <label class="palette-field">
        <span>Page claire</span>
        <input id="backgroundLightInput" type="color" value="#dbeafe" aria-label="Choisir la couleur du fond clair">
      </label>
      <label class="palette-field">
        <span>Page sombre</span>
        <input id="backgroundDarkInput" type="color" value="#020617" aria-label="Choisir la couleur du fond sombre">
      </label>
      <label class="palette-field">
        <span>Panneau clair</span>
        <input id="panelLightInput" type="color" value="#ffffff" aria-label="Choisir la couleur claire du panneau principal">
      </label>
      <label class="palette-field">
        <span>Panneau sombre</span>
        <input id="panelDarkInput" type="color" value="#0f172a" aria-label="Choisir la couleur sombre du panneau principal">
      </label>
    </div>

    <div class="palette-section">
      <p class="palette-section-title">Heure</p>
      <label class="palette-field">
        <span>Couleur date</span>
        <input id="dateColorInput" type="color" value="#2563eb" aria-label="Choisir la couleur de la date">
      </label>
      <label class="palette-field">
        <span>Couleur libellé</span>
        <input id="clockLabelColorInput" type="color" value="#1d4ed8" aria-label="Choisir la couleur du libellé de l'heure">
      </label>
      <label class="palette-field">
        <span>Couleur heure</span>
        <input id="clockTimeColorInput" type="color" value="#0f172a" aria-label="Choisir la couleur de l'heure">
      </label>
      <label class="palette-field palette-field-time">
        <span>Heure manuelle</span>
        <input id="manualTimeInput" type="time" value="" step="1" aria-label="Modifier l'heure affichée">
      </label>
      <button id="resetManualTimeButton" class="palette-action-button palette-inline-button" type="button">
        Revenir à l'heure automatique
      </button>
    </div>

    <div class="palette-section">
      <p class="palette-section-title">Textes affichage</p>
      <label class="palette-field">
        <span>Logo texte</span>
        <input id="brandTextColorInput" type="color" value="#0f172a" aria-label="Choisir la couleur du texte du logo">
      </label>
      <label class="palette-field">
        <span>Logo icône</span>
        <input id="brandIconColorInput" type="color" value="#0f172a" aria-label="Choisir la couleur de l'icône du logo">
      </label>
      <label class="palette-field">
        <span>Pourcentage repos</span>
        <input id="percentColorInput" type="color" value="#0f172a" aria-label="Choisir la couleur du pourcentage au repos">
      </label>
      <label class="palette-field">
        <span>Pourcentage charge</span>
        <input id="percentChargingColorInput" type="color" value="#22c55e" aria-label="Choisir la couleur du pourcentage en charge">
      </label>
    </div>

    <div class="palette-section">
      <p class="palette-section-title">Logo du haut</p>
      <label class="palette-field palette-field-text">
        <span>Texte</span>
        <input id="brandTextInput" type="text" value="Batterie en Grand" maxlength="80" aria-label="Modifier le texte du logo en haut">
      </label>
      <label class="palette-field palette-field-text">
        <span>Icône</span>
        <input id="brandIconInput" type="text" value="" maxlength="80" placeholder="Texte ou symbole" aria-label="Modifier l'icône du logo en haut">
      </label>
    </div>

    <div class="palette-section">
      <p class="palette-section-title">Batterie</p>
      <label class="palette-field">
        <span>Indicateur en charge</span>
        <input id="chargingActiveColorInput" type="color" value="#22c55e" aria-label="Choisir la couleur de l'indicateur quand la batterie charge">
      </label>
      <label class="palette-field">
        <span>Indicateur au repos</span>
        <input id="chargingIdleColorInput" type="color" value="#9ca3af" aria-label="Choisir la couleur de l'indicateur quand la batterie ne charge pas">
      </label>
      <label class="palette-field">
        <span>Texte de charge</span>
        <input id="chargingTextColorInput" type="color" value="#ffffff" aria-label="Choisir la couleur du texte de charge">
      </label>
      <label class="palette-field">
        <span>Contour batterie droite</span>
        <input id="batteryShellColorInput" type="color" value="#0f172a" aria-label="Choisir la couleur du contour de la batterie droite">
      </label>
      <label class="palette-field palette-field-text">
        <span>Texte charge</span>
        <input id="chargingIconInput" type="text" value="⚡" maxlength="80" aria-label="Modifier le texte de charge">
      </label>
      <label class="palette-field">
        <span>80% et +</span>
        <input id="levelHighColorInput" type="color" value="#22c55e" aria-label="Couleur pour 80 pourcent et plus">
      </label>
      <label class="palette-field">
        <span>50% et +</span>
        <input id="levelMediumColorInput" type="color" value="#facc15" aria-label="Couleur pour 50 pourcent et plus">
      </label>
      <label class="palette-field">
        <span>35% et +</span>
        <input id="levelWarningColorInput" type="color" value="#fb923c" aria-label="Couleur pour 35 pourcent et plus">
      </label>
      <label class="palette-field">
        <span id="levelLowColorLabel">15% et +</span>
        <input id="levelLowColorInput" type="color" value="#dc2626" aria-label="Couleur pour 15 pourcent et plus">
      </label>
      <label class="palette-field">
        <span id="levelCriticalColorLabel">Moins de 15%</span>
        <input id="levelCriticalColorInput" type="color" value="#7f1d1d" aria-label="Couleur critique de la batterie">
      </label>
      <label class="palette-field palette-field-number">
        <span>Seuil critique</span>
        <input id="criticalThresholdInput" type="number" value="15" min="1" max="99" aria-label="Seuil critique en pourcentage">
      </label>
    </div>
  </div>

  <div id="warningOverlay" class="warning-overlay" aria-hidden="true"></div>

  <div class="hint-group">
    <button id="fullscreenHint" class="hint hint-button" type="button">Cliquer pour plein écran</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
